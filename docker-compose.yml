services:
  agentregress:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
      - agentregress-data:/data
    environment:
      - AGENTREGRESS_DATA_DIR=/data
    command: >
      sh -c "pip install -e . && python -m http.server 8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  agentregress-data:
