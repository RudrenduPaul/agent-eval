services:
  # Leaderboard UI at http://localhost:8080
  web:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: python web/serve.py
    ports:
      - "8080:8080"

  # Basic comparison example — shows agent-regress output on first run
  example:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "
        pip install uv --quiet &&
        uv sync --extra dev --quiet &&
        uv run python examples/01-basic-comparison/example.py
      "
    environment:
      - PYTHONUNBUFFERED=1
