services:
  agentregress:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "
        pip install uv --quiet &&
        uv sync --extra dev --quiet &&
        uv run python examples/01-basic-comparison/example.py
      "
    environment:
      - PYTHONUNBUFFERED=1
